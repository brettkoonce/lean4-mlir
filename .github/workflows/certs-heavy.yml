name: Certify Heavy Corpus

# The GENERATED full-input certificate instances (`lake build CertsHeavy`:
# 784-dim scorecard + per-pair LipSDP + IBP L∞ — ~90k lines of weight/image
# data across 8 files) + their three-axiom audit (tests/AuditAxiomsHeavy.lean).
#
# Split out of certs.yml 2026-07-12: these are long-running, data-heavy tails
# (the linarith PSD goals carry ~230-digit LDLᵀ fractions; peak elaboration
# memory took down the shared 4-core/16GB runners, and blueprint.yml builds
# `Certs` too, so ONE heavy module broke three workflows). Long-running corpus
# work gets its own workflow so it can never break the core: this runs on
# pushes that actually touch the heavy files, weekly (drift), and on demand.
# LEAN_NUM_THREADS is capped to bound per-module peak memory on 16GB runners.

# MANUAL-ONLY for now: measured peaks at LEAN_NUM_THREADS=2 — ImgsA 39.5 GB,
# IBP 20.2 GB, SDP 17.1 GB — NOTHING in the generated tier fits a free 16 GB
# runner in any configuration (5 failed attempts, all documented in
# planning/certs_heavy_psd_memory.md). The corpus is kernel-verified locally
# on every regeneration; this workflow stays for a future self-hosted runner
# (mars idles at 188 GB) — flip the trigger back then.
on:
  workflow_dispatch:

jobs:
  certify-heavy:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      # bound per-module elaboration parallelism (with the LipSDP modules
      # CI-disabled the remaining scorecard/IBP tiers are memory-moderate;
      # 2 threads × one module at a time fits comfortably). The swapfile
      # experiment from the SDP era is gone: 10G fallocate doesn't fit the
      # runner's root partition (failed in 7 s) — use /mnt if ever needed.
      LEAN_NUM_THREADS: 2
    steps:
      - uses: actions/checkout@v4

      - name: Audit coverage check (both audits ⊆ their lib roots)
        run: python3 scripts/check_audit_coverage.py

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake/build
          # shares the `lake-certs-` namespace with certs.yml/comparator.yml —
          # CertsHeavy's imports subsume the Certs roots, so restoring their
          # build products is exactly the warm start this job wants.
          key: lake-certs-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}-heavy-${{ github.run_id }}
          restore-keys: |
            lake-certs-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}-
            lake-certs-

      - name: Build heavy certificate corpus
        run: |
          lake exe cache get || true
          free -h
          # ONE heavy module at a time: Lake 5.0 has no --jobs flag, and its
          # default scheduler elaborates several 30k-line modules concurrently
          # — the runner OOMs even with LEAN_NUM_THREADS=2 (one SDP module
          # peaks at 17.08 GB at 4 threads). Sequential per-module invocations
          # serialize the heavy elaborations (each call's heavy deps are
          # already built by the previous ones); the final CertsHeavy call is
          # a no-op verification. If this ever threatens the 300-min budget,
          # split across per-net jobs instead.
          # NB the per-pair LipSDP modules are currently DISABLED (removed
          # from CertsHeavy): their PSD witnesses OOM every free-tier runner
          # config — see planning/certs_heavy_psd_memory.md for the re-enable
          # plan. They stay kernel-verified locally.
          for m in LipschitzCertScorecardFullNets \
                   LipschitzCertScorecardFullImgsA \
                   LipschitzCertScorecardFullImgsB \
                   LipschitzCertScorecardFull \
                   LipschitzCertScorecardIBP \
                   LipschitzCertScorecardIBPUncon; do
            echo "=== building $m ==="
            free -m | head -2
            lake build LeanMlir.Proofs.$m
          done
          lake build CertsHeavy

      - name: Three-axiom closure check (heavy corpus)
        run: |
          set -e
          out=$(lake env lean tests/AuditAxiomsHeavy.lean 2>&1 | sed ':a;N;$!ba;s/,\n /, /g')
          # Subset of the three, any order — see certs.yml (Lean 4.32 shrank some lists).
          AX3='(propext|Classical\.choice|Quot\.sound)'
          OK_RE="depends on axioms: \[$AX3(, $AX3)*\]\$"
          total=$(echo "$out" | grep -c "depends on axioms:" || true)
          ok=$(echo "$out" | grep -cE "$OK_RE" || true)

          echo "Total #print axioms lines:        $total"
          echo "Lines matching {propext, Classical.choice, Quot.sound}: $ok"

          if [ "$total" -eq 0 ]; then
            echo "::error::tests/AuditAxiomsHeavy.lean produced no #print axioms output"
            echo "$out"
            exit 1
          fi

          if [ "$total" -ne "$ok" ]; then
            echo "::error::Some heavy-corpus theorems depend on axioms outside [propext, Classical.choice, Quot.sound]:"
            echo "$out" | grep "depends on axioms:" \
              | grep -vE "$OK_RE" || true
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Three-Axiom Closure — heavy corpus" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **All ${total} heavy-corpus theorems closed under [\`propext\`, \`Classical.choice\`, \`Quot.sound\`]**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full-input scorecard (L2 Tsuzuku + IBP L∞): capped σ≤2 92/100 @ L2 ε=0.1; IBP 92/88/69/24 per 100 @ L∞ ε=1/2/4/8 per 255. (Per-pair LipSDP instances kernel-verified locally but CI-disabled — memory; see planning/certs_heavy_psd_memory.md.)" >> $GITHUB_STEP_SUMMARY
