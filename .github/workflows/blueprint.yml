name: Compile blueprint

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_blueprint:
    runs-on: ubuntu-latest
    name: Build blueprint + deploy to Pages
    steps:
      - name: Cleanup to free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.0
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout project
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install elan (Lean toolchain manager)
        # GitHub's release server intermittently returns 504 when fetching
        # the elan tarball; retry up to 3× with a 10 s backoff before
        # declaring failure.
        run: |
          for attempt in 1 2 3; do
            if curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- --default-toolchain none -y; then
              echo "elan installed on attempt $attempt"
              break
            fi
            echo "::warning::elan install failed (attempt $attempt/3), retrying in 10 s..."
            sleep 10
          done
          test -x "$HOME/.elan/bin/elan" || { echo "::error::elan install failed after 3 attempts"; exit 1; }
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache .lake (Mathlib oleans + our build products)
        uses: actions/cache@v4
        with:
          path: .lake
          # Invalidate cache when Mathlib rev changes or lean-toolchain bumps.
          key: lake-${{ runner.os }}-${{ hashFiles('lake-manifest.json', 'lean-toolchain') }}
          restore-keys: |
            lake-${{ runner.os }}-

      # NOTE: we don't run `lake update` on every CI build — that would
      # ratchet Mathlib forward and trigger a toolchain upgrade every time
      # Mathlib bumps Lean, which exposed us to transient network failures
      # when the Lean release server returned 504. Instead: run `lake
      # -R -Kenv=dev update` locally when adding/changing a dep, commit
      # the resulting lake-manifest.json + lean-toolchain, and CI just
      # reads them. Same pattern Mathlib itself uses.

      - name: Fetch Mathlib cache
        run: |
          # If actions/cache restored .lake already, `cache get` is a fast no-op.
          # Otherwise it downloads ~5GB of Mathlib oleans from the Azure cache server.
          lake exe cache get || true

      - name: Build Lean library
        run: |
          # `checkdecls` imports the umbrella `LeanMlir` module, which pulls in
          # MlirCodegen + Types + IreeRuntime etc. via LeanMlir.lean. Also build
          # the Proofs submodules explicitly to make sure they're all present.
          lake build LeanMlir \
                     LeanMlir.Proofs.Tensor LeanMlir.Proofs.MLP \
                     LeanMlir.Proofs.CNN LeanMlir.Proofs.BatchNorm \
                     LeanMlir.Proofs.Residual LeanMlir.Proofs.Depthwise \
                     LeanMlir.Proofs.SE LeanMlir.Proofs.LayerNorm \
                     LeanMlir.Proofs.Attention

      - name: Install graphviz (system-wide so output-format plugins register)
        # cache-apt-pkgs-action caches the graphviz binaries but skips the
        # postinst that runs `dot -c` to register output-format plugins
        # (PDF, PNG, SVG, etc.). Without that, `dot -Tsvg` errors with
        # "Format svg not recognized". Same fix as TeX below — plain
        # apt-get install lands the files under /usr/ and runs postinst.
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz libgraphviz-dev pkg-config

      - name: Install TeX Live (system-wide so postinst runs properly)
        # cache-apt-pkgs-action installs into ~/.aptcache/ (user-local
        # prefix); texlive-xetex's postinst expects system paths and
        # silently fails there, leaving xelatex.fmt unbuilt. A plain
        # apt-get install lands TeX under /usr/ where the postinst
        # actually registers xelatex with fmtutil. Costs ~2 min per run
        # but is the only reliable path we've found.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base texlive-latex-extra texlive-fonts-extra \
            texlive-fonts-recommended texlive-xetex texlive-science \
            texlive-pictures texlive-plain-generic texlive-font-utils \
            texlive-luatex texlive-bibtex-extra latexmk

      - name: Verify xelatex format is available
        run: |
          echo "--- which xelatex ---"
          which xelatex
          echo "--- kpsewhich xelatex.fmt ---"
          kpsewhich xelatex.fmt || echo "::warning::xelatex.fmt missing"
          echo "--- xelatex -v ---"
          xelatex -v | head -3 || true

      - name: Render architecture diagrams from .dot sources
        # The sandbox graphviz build we use locally is stripped-down and
        # doesn't emit PDF/PNG, only SVG. CI's apt-installed graphviz has
        # full format support, so we regenerate both SVG (for web) and PDF
        # (for xelatex \includegraphics) from every .dot in the figures
        # tree here, before blueprint builds consume them.
        run: |
          find blueprint/src/figures -name "*.dot" | while read dot; do
            dir=$(dirname "$dot")
            base=$(basename "$dot" .dot)
            dot -Tsvg "$dot" -o "$dir/$base.svg"
            dot -Tpdf "$dot" -o "$dir/$base.pdf"
            echo "rendered: $dir/$base.{svg,pdf}"
          done

      - name: Regenerate training-curve PNGs from ablation logs
        # Training-curve figures are committed PNGs for reliability, but
        # we regenerate them in CI so any log change automatically
        # updates the figure. matplotlib + numpy are the only deps.
        run: |
          pip install --quiet matplotlib
          cd figures
          for script in plot_mnist_mlp.py plot_mnist_mlp_vs_cnn.py plot_cifar_bn_vs_nobn.py; do
            if [ -f "$script" ]; then
              python3 "$script"
            fi
          done

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-leanblueprint-v1

      - name: Install leanblueprint
        run: |
          pip install leanblueprint

      - name: Build Lean API docs (doc-gen4)
        # First run after re-enabling takes ~25 min (builds HTML for all
        # transitive Mathlib declarations). Subsequent runs hit the .lake
        # cache above and finish in minutes — only our own declarations
        # rebuild, since Mathlib doc-state doesn't change unless we
        # `lake update` (which we don't do in CI).
        #
        # doc-gen4 doesn't yet support external-refs-to-hosted-Mathlib-docs,
        # so we have to rebuild Mathlib docs locally. This is the same
        # compromise Mathlib-adjacent projects (Carleson, PNT, FLT) make.
        run: |
          lake -R -Kenv=dev build LeanMlir:docs

      - name: Build blueprint web version
        run: |
          # Generates blueprint/lean_decls as a side effect (used by checkdecls).
          leanblueprint web

      - name: Check Lean declarations referenced in blueprint
        run: |
          leanblueprint checkdecls

      - name: Build blueprint PDF
        # Don't block the web deploy if PDF fails, but surface detailed
        # diagnostics so we can fix it.
        continue-on-error: true
        run: |
          set +e
          mkdir -p blueprint/_diag
          # Capture leanblueprint's own stdout+stderr — this is where any
          # Python-level traceback or latex-error-report lives.
          leanblueprint pdf > blueprint/_diag/leanblueprint.stdout.txt 2> blueprint/_diag/leanblueprint.stderr.txt
          status=$?
          echo "=========================================="
          echo "leanblueprint pdf exit status: $status"
          echo "=========================================="
          echo "--- leanblueprint stdout (head 400) ---"
          head -n 400 blueprint/_diag/leanblueprint.stdout.txt 2>/dev/null || true
          echo "--- leanblueprint stderr (head 400) ---"
          head -n 400 blueprint/_diag/leanblueprint.stderr.txt 2>/dev/null || true
          echo "--- blueprint/src contents ---"
          ls -la blueprint/src 2>/dev/null || true
          echo "--- blueprint/print contents ---"
          ls -la blueprint/print 2>/dev/null || true
          echo "--- blueprint top contents ---"
          ls -la blueprint 2>/dev/null || true
          # Try any .log we can find anywhere under blueprint/
          echo "--- find *.log under blueprint/ ---"
          find blueprint -name "*.log" 2>/dev/null || true
          for f in $(find blueprint -name "*.log" 2>/dev/null); do
            echo "--- tail 200 of $f ---"
            tail -n 200 "$f" 2>/dev/null
          done
          if [ $status -ne 0 ]; then
            echo "::warning::PDF build failed (status $status); web version still ships."
          fi
          exit 0

      - name: Assemble public/ directory for Pages
        run: |
          mkdir -p public
          # Homepage (index.md etc.) rendered as markdown; ship as-is and let
          # GitHub Pages process it with Jekyll.
          cp -r home_page/* public/ 2>/dev/null || true
          # Blueprint web
          mkdir -p public/blueprint
          cp -r blueprint/web/* public/blueprint/ 2>/dev/null || true
          # doc-gen4 Lean API docs, so blueprint's \dochome links resolve.
          # Output from `lake ... build LeanMlir:docs` lands at
          # .lake/build/doc/ with declarations under /find/, /Proofs/, etc.
          mkdir -p public/docs
          cp -r .lake/build/doc/* public/docs/ 2>/dev/null || \
            echo "::warning::No doc-gen4 output at .lake/build/doc/; docs/ will 404."
          # Blueprint PDF — try multiple known paths, log what we find.
          if [ -f blueprint/print/print.pdf ]; then
            cp blueprint/print/print.pdf public/blueprint.pdf
            echo "Copied PDF from blueprint/print/print.pdf"
          elif [ -f blueprint/print.pdf ]; then
            cp blueprint/print.pdf public/blueprint.pdf
            echo "Copied PDF from blueprint/print.pdf"
          elif [ -f blueprint/src/print.pdf ]; then
            cp blueprint/src/print.pdf public/blueprint.pdf
            echo "Copied PDF from blueprint/src/print.pdf"
          else
            echo "::warning::No PDF found at any expected path; blueprint.pdf will 404."
            find blueprint -name "*.pdf" -maxdepth 3 2>/dev/null || true
          fi
          # Ship latex diagnostic artifacts so we can curl them from the
          # deployed Pages site without needing repo-admin log access.
          mkdir -p public/build-logs
          # leanblueprint's own stdout+stderr (Python-level errors land here).
          cp blueprint/_diag/leanblueprint.stdout.txt public/build-logs/ 2>/dev/null || true
          cp blueprint/_diag/leanblueprint.stderr.txt public/build-logs/ 2>/dev/null || true
          # Any latex log/fls/aux/fdb that did get written.
          for f in $(find blueprint -maxdepth 3 -type f \
                       \( -name "*.log" -o -name "*.fls" -o -name "*.aux" \
                          -o -name "*.fdb_latexmk" -o -name "*.blg" \) 2>/dev/null); do
            # Flatten path for URL-friendliness: blueprint/print/print.log -> print__print.log
            out="$(echo "$f" | sed 's|blueprint/||; s|/|__|g')"
            cp "$f" "public/build-logs/$out" 2>/dev/null || true
          done
          # Snapshot of what showed up where, in one grep-able file.
          {
            echo "--- ls blueprint ---"
            ls -la blueprint 2>/dev/null || true
            echo "--- ls blueprint/src ---"
            ls -la blueprint/src 2>/dev/null || true
            echo "--- ls blueprint/print ---"
            ls -la blueprint/print 2>/dev/null || true
            echo "--- find blueprint *.pdf ---"
            find blueprint -name "*.pdf" -maxdepth 3 2>/dev/null || true
            echo "--- find blueprint *.log ---"
            find blueprint -name "*.log" -maxdepth 3 2>/dev/null || true
          } > public/build-logs/filesystem.txt
          # Keep the standalone graphviz DAG as an alt artifact
          cp LeanMlir/Proofs/blueprint.svg public/deps.svg 2>/dev/null || true
          ls -la public/ public/build-logs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy_pages:
    needs: build_blueprint
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
