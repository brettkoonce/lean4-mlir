name: Verify Proofs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check-proofs:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: lake-

      - name: Install Python deps
        run: pip install scipy numpy

      - name: Build proofs
        run: |
          lake build LeanMlir.Proofs.Tensor \
                     LeanMlir.Proofs.MLP \
                     LeanMlir.Proofs.CNN \
                     LeanMlir.Proofs.BatchNorm \
                     LeanMlir.Proofs.Residual \
                     LeanMlir.Proofs.Depthwise \
                     LeanMlir.Proofs.SE \
                     LeanMlir.Proofs.LayerNorm \
                     LeanMlir.Proofs.Attention \
                     LeanMlir.Proofs.MobileNetV2 \
                     LeanMlir.Proofs.ConvNeXt \
                     LeanMlir.Proofs.EfficientNet

      - name: Three-axiom closure check
        run: |
          set -e
          out=$(lake env lean tests/AuditAxioms.lean 2>&1)
          total=$(echo "$out" | grep -c "depends on axioms:" || true)
          ok=$(echo "$out" | grep -cE "depends on axioms: \[propext, Classical\.choice, Quot\.sound\]$" || true)

          echo "Total #print axioms lines:        $total"
          echo "Lines matching {propext, Classical.choice, Quot.sound}: $ok"

          if [ "$total" -eq 0 ]; then
            echo "::error::tests/AuditAxioms.lean produced no #print axioms output"
            echo "$out"
            exit 1
          fi

          if [ "$total" -ne "$ok" ]; then
            echo "::error::Some theorems depend on axioms outside [propext, Classical.choice, Quot.sound]:"
            echo "$out" | grep "depends on axioms:" \
              | grep -vE "depends on axioms: \[propext, Classical\.choice, Quot\.sound\]$" || true
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Three-Axiom Closure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **All ${total} headline theorems closed under [\`propext\`, \`Classical.choice\`, \`Quot.sound\`]**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Verified by \`tests/AuditAxioms.lean\` (no \`sorryAx\`, no project axioms)." >> $GITHUB_STEP_SUMMARY

      - name: Summary
        run: |
          echo "## Proof Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Sorry count
          SORRIES=$(lake build LeanMlir.Proofs.Tensor LeanMlir.Proofs.MLP LeanMlir.Proofs.CNN LeanMlir.Proofs.BatchNorm LeanMlir.Proofs.Residual LeanMlir.Proofs.Depthwise LeanMlir.Proofs.SE LeanMlir.Proofs.LayerNorm LeanMlir.Proofs.Attention LeanMlir.Proofs.MobileNetV2 LeanMlir.Proofs.ConvNeXt LeanMlir.Proofs.EfficientNet 2>&1 | grep -c "sorry" || true)
          if [ "$SORRIES" -eq 0 ]; then
            echo "✅ **All proofs verified — zero sorry**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **${SORRIES} sorry(s) remaining:**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Line | Note |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
            lake build LeanMlir.Proofs.Tensor LeanMlir.Proofs.MLP LeanMlir.Proofs.CNN LeanMlir.Proofs.BatchNorm LeanMlir.Proofs.Residual LeanMlir.Proofs.Depthwise LeanMlir.Proofs.SE LeanMlir.Proofs.LayerNorm LeanMlir.Proofs.Attention LeanMlir.Proofs.MobileNetV2 LeanMlir.Proofs.ConvNeXt LeanMlir.Proofs.EfficientNet 2>&1 | grep "sorry" | while read line; do
              file=$(echo "$line" | sed 's/warning: //' | sed 's/:.*//')
              lineno=$(echo "$line" | grep -o ':[0-9]*:' | head -1 | tr -d ':')
              decl=$(echo "$line" | sed "s/.*declaration uses .sorry.//" | sed "s/'//g")
              case "$file" in
                *Tensor*) note="vjp3_comp: 6-level Finset.sum_comm (sum reordering bookkeeping)" ;;
                *) note="$decl" ;;
              esac
              link="https://github.com/${{ github.repository }}/blob/${{ github.sha }}/${file}#L${lineno}"
              echo "| [${file}](${link}) | ${lineno} | ${note} |" >> $GITHUB_STEP_SUMMARY
            done
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Theorems / Defs | Axioms | Lines |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----------------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          # Count all top-level theorems and (noncomputable) defs — broader
          # than a VJP-keyword filter, catches structural lemmas too.
          THM_PAT='^(theorem|noncomputable def|def) '
          TOTAL_THMS=0
          TOTAL_AXMS=0
          for f in LeanMlir/Proofs/Tensor.lean LeanMlir/Proofs/MLP.lean LeanMlir/Proofs/CNN.lean LeanMlir/Proofs/BatchNorm.lean LeanMlir/Proofs/Residual.lean LeanMlir/Proofs/Depthwise.lean LeanMlir/Proofs/SE.lean LeanMlir/Proofs/LayerNorm.lean LeanMlir/Proofs/Attention.lean LeanMlir/Proofs/MobileNetV2.lean LeanMlir/Proofs/ConvNeXt.lean LeanMlir/Proofs/EfficientNet.lean; do
            name=$(basename "$f")
            thms=$(grep -cE "$THM_PAT" "$f" || true)
            axms=$(grep -c "^axiom " "$f" || true)
            lines=$(wc -l < "$f")
            echo "| \`${name}\` | ${thms} | ${axms} | ${lines} |" >> $GITHUB_STEP_SUMMARY
            TOTAL_THMS=$((TOTAL_THMS + thms))
            TOTAL_AXMS=$((TOTAL_AXMS + axms))
          done
          TOTAL_LINES=$(cat LeanMlir/Proofs/*.lean | wc -l)
          echo "| **Total** | **${TOTAL_THMS}** | **${TOTAL_AXMS}** | **${TOTAL_LINES}** |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Numerical Gradient Checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Axiom | Max Error | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          python3 LeanMlir/Proofs/check_jacobians.py 2>&1 | grep -E "PASS|FAIL" | while read line; do
            status=$(echo "$line" | grep -o "PASS\|FAIL")
            name=$(echo "$line" | sed 's/.*: //' | sed 's/ *max_err.*//')
            err=$(echo "$line" | grep -o "max_err=[0-9.e+-]*" | sed 's/max_err=//')
            icon=$( [ "$status" = "PASS" ] && echo "✅" || echo "❌" )
            echo "| ${name} | ${err} | ${icon} ${status} |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY

          # Fail CI if gradient checks fail
          python3 LeanMlir/Proofs/check_jacobians.py

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Bestiary Entries" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Variants | Lines |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|-------|" >> $GITHUB_STEP_SUMMARY
          total_variants=0
          total_bestiary_lines=0
          total_bestiary_files=0
          for f in Bestiary/*.lean; do
            base=$(basename "$f")
            # Each `def X : NetSpec` is a variant (architecture + sizes + tiny fixtures)
            variants=$(grep -cE '^def [a-zA-Z0-9_]+ : NetSpec' "$f" || true)
            lines=$(wc -l < "$f")
            echo "| \`${base}\` | ${variants} | ${lines} |" >> $GITHUB_STEP_SUMMARY
            total_variants=$((total_variants + variants))
            total_bestiary_lines=$((total_bestiary_lines + lines))
            total_bestiary_files=$((total_bestiary_files + 1))
          done
          echo "| **Total (${total_bestiary_files} files)** | **${total_variants}** | **${total_bestiary_lines}** |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Codebase Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Files | Lines |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|-------|" >> $GITHUB_STEP_SUMMARY
          for category in "Proofs:LeanMlir/Proofs/*.lean" "Core Library:LeanMlir/*.lean" "Bestiary:Bestiary/*.lean" "Trainers:Main*Train*.lean" "Tests:tests/*.lean" "FFI (C):ffi/*.c ffi/*.h"; do
            name="${category%%:*}"
            pattern="${category##*:}"
            files=$(ls $pattern 2>/dev/null | wc -l)
            lines=$(cat $pattern 2>/dev/null | wc -l)
            echo "| ${name} | ${files} | ${lines} |" >> $GITHUB_STEP_SUMMARY
          done
          total_lean=$(find . -name "*.lean" -not -path "./.lake/*" -not -path "./jax/*" -not -path "./mnist-lean4/*" | xargs cat | wc -l)
          total_c=$(cat ffi/*.c ffi/*.h 2>/dev/null | wc -l)
          echo "| **Total Lean** | | **${total_lean}** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total C** | | **${total_c}** |" >> $GITHUB_STEP_SUMMARY
