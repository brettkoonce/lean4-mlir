name: Verify Proofs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check-proofs:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: lake-

      - name: Install Python deps
        run: pip install scipy numpy

      - name: Build proofs
        run: |
          lake build LeanMlir.Proofs.Tensor \
                     LeanMlir.Proofs.MLP \
                     LeanMlir.Proofs.CNN \
                     LeanMlir.Proofs.BatchNorm \
                     LeanMlir.Proofs.Residual \
                     LeanMlir.Proofs.Depthwise \
                     LeanMlir.Proofs.SE \
                     LeanMlir.Proofs.LayerNorm \
                     LeanMlir.Proofs.Attention

      - name: Summary
        run: |
          echo "## Proof Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Sorry count
          SORRIES=$(lake build LeanMlir.Proofs.Tensor LeanMlir.Proofs.MLP LeanMlir.Proofs.CNN LeanMlir.Proofs.BatchNorm LeanMlir.Proofs.Residual LeanMlir.Proofs.Depthwise LeanMlir.Proofs.SE LeanMlir.Proofs.LayerNorm LeanMlir.Proofs.Attention 2>&1 | grep -c "sorry" || true)
          if [ "$SORRIES" -eq 0 ]; then
            echo "✅ **All proofs verified — zero sorry**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **${SORRIES} sorry(s) remaining:**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Line | Note |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
            lake build LeanMlir.Proofs.Tensor LeanMlir.Proofs.MLP LeanMlir.Proofs.CNN LeanMlir.Proofs.BatchNorm LeanMlir.Proofs.Residual LeanMlir.Proofs.Depthwise LeanMlir.Proofs.SE LeanMlir.Proofs.LayerNorm LeanMlir.Proofs.Attention 2>&1 | grep "sorry" | while read line; do
              file=$(echo "$line" | sed 's/warning: //' | sed 's/:.*//')
              lineno=$(echo "$line" | grep -o ':[0-9]*:' | head -1 | tr -d ':')
              decl=$(echo "$line" | sed "s/.*declaration uses .sorry.//" | sed "s/'//g")
              case "$file" in
                *Tensor*) note="vjp3_comp: 6-level Finset.sum_comm (sum reordering bookkeeping)" ;;
                *) note="$decl" ;;
              esac
              link="https://github.com/${{ github.repository }}/blob/${{ github.sha }}/${file}#L${lineno}"
              echo "| [${file}](${link}) | ${lineno} | ${note} |" >> $GITHUB_STEP_SUMMARY
            done
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Theorems | Axioms | Lines |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          for f in LeanMlir/Proofs/Tensor.lean LeanMlir/Proofs/MLP.lean LeanMlir/Proofs/CNN.lean LeanMlir/Proofs/BatchNorm.lean LeanMlir/Proofs/Residual.lean LeanMlir/Proofs/Depthwise.lean LeanMlir/Proofs/SE.lean LeanMlir/Proofs/LayerNorm.lean LeanMlir/Proofs/Attention.lean; do
            name=$(basename "$f")
            thms=$(grep -cE "^(theorem|noncomputable def|def) .*(HasVJP|_has_vjp|_correct|_grad)" "$f" || true)
            axms=$(grep -c "^axiom " "$f" || true)
            lines=$(wc -l < "$f")
            echo "| \`${name}\` | ${thms} | ${axms} | ${lines} |" >> $GITHUB_STEP_SUMMARY
          done
          TOTAL_THMS=$(grep -rcE "^(theorem|noncomputable def|def) .*(HasVJP|_has_vjp|_correct|_grad)" LeanMlir/Proofs/ || true)
          TOTAL_AXMS=$(grep -rc "^axiom " LeanMlir/Proofs/ || true)
          TOTAL_LINES=$(cat LeanMlir/Proofs/*.lean | wc -l)
          echo "| **Total** | **$(echo "$TOTAL_THMS" | wc -l)** | **$(echo "$TOTAL_AXMS" | wc -l)** | **${TOTAL_LINES}** |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Numerical Gradient Checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Axiom | Max Error | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          python3 LeanMlir/Proofs/check_axioms.py 2>&1 | grep -E "PASS|FAIL" | while read line; do
            status=$(echo "$line" | grep -o "PASS\|FAIL")
            name=$(echo "$line" | sed 's/.*: //' | sed 's/ *max_err.*//')
            err=$(echo "$line" | grep -o "max_err=[0-9.e+-]*" | sed 's/max_err=//')
            icon=$( [ "$status" = "PASS" ] && echo "✅" || echo "❌" )
            echo "| ${name} | ${err} | ${icon} ${status} |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY

          # Fail CI if gradient checks fail
          python3 LeanMlir/Proofs/check_axioms.py
