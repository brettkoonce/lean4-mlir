name: Verify Proofs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check-proofs:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Audit coverage check (AuditAxioms imports ⊆ Proofs+Certs roots)
        # Fail fast (no Lean needed) if tests/AuditAxioms.lean imports a module
        # that `lake build Certs` won't build — the closure check itself runs
        # in certs.yml, but catching a root gap here surfaces it on every push
        # instead of the next corpus run. Locally the gap hides behind stale
        # dev .oleans, so CI is the only place it surfaces (see 5f27766).
        run: python3 scripts/check_audit_coverage.py

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake/build
          # Cache ONLY the project build (oleans/traces/ir), NOT .lake/packages.
          # Mathlib (~2.3 GB) is restored separately by `lake exe cache get`
          # below, so caching it here just duplicated it — and with the rolling
          # key that wrote a fresh ~3 GB entry every run, blowing GitHub's ~10 GB
          # cache budget across proofs/certs/comparator → LRU eviction → periodic
          # ~30-min cold rebuilds. The rolling key still persists each run's
          # project oleans (freshness, per the note that used to live here); the
          # entries are now a few hundred MB so they no longer thrash. Keyed under
          # a `lake-proofs-` namespace (separate from certs/comparator's
          # `lake-certs-`) so a Proofs job never restores a Certs cache and ends
          # up rebuilding that huge corpus cold — no bare `lake-` fallback.
          key: lake-proofs-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}-${{ github.run_id }}
          restore-keys: |
            lake-proofs-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}-
            lake-proofs-

      - name: Install Python deps
        run: pip install scipy numpy

      - name: Build proofs (per-push slice)
        run: |
          # `Proofs` is the fast per-push slice since the Certs split
          # (planning/repo_shape_deletion_audit.md §4): the IR/render layer the
          # demo cone reaches + every renderer the drift guard re-elaborates.
          # The certificate corpus + the three-axiom closure audit moved to
          # .github/workflows/certs.yml (proof-path pushes, nightly cron,
          # manual dispatch) — so demo/book/engine pushes skip the corpus tail.
          # Fetch the Mathlib olean cache (fast no-op when the .lake cache already
          # restored it) so a rolling-key cache miss never rebuilds Mathlib from source.
          lake exe cache get || true
          lake build Proofs

      - name: Verified-render drift guard (committed .mlir == proven renderer)
        # Re-elaborate the renderer files (re-runs their #eval writers) so the
        # committed verified_mlir/<net>_* equal the proven renderer the net's
        # FaithfulPoC/TiePoC certifies and Main<Net>Verified trains on. If they
        # drift, fail (regenerate with the `lake env lean …` shown). Covers the
        # full proof-rendered set — every committed forward + SGD train-step the
        # §1a ties certify. NOT covered (exe-generated, not pure-Lean renders):
        # the optimizer variants (*_adam/_sgd/_mom_train_step), *_fwd_eval, and
        # cifar8w_* — those are written by the Main<Net>Verified* exes, see gap #2.
        run: |
          set -e
          # StableHLO.lean writes all 8 proof-rendered forwards + the linear train step.
          lake env lean LeanMlir/Proofs/StableHLO.lean
          git diff --exit-code -- \
              verified_mlir/linear_fwd.mlir verified_mlir/linear_train_step.mlir \
              verified_mlir/mlp_fwd.mlir verified_mlir/cnn_fwd.mlir \
              verified_mlir/cifar_fwd.mlir verified_mlir/cifar_bn_fwd.mlir \
              verified_mlir/cifar8_fwd.mlir verified_mlir/cifar8_bn_fwd.mlir \
            || { echo "::error::committed verified_mlir/{linear,mlp,cnn,cifar,cifar_bn,cifar8,cifar8_bn}_*.mlir drifted (regen: lake env lean LeanMlir/Proofs/StableHLO.lean)"; exit 1; }
          # Per-net train-step renderers.
          lake env lean LeanMlir/Proofs/MlpRender.lean
          git diff --exit-code -- verified_mlir/mlp_train_step.mlir \
            || { echo "::error::committed verified_mlir/mlp_train_step.mlir drifted (regen: lake env lean LeanMlir/Proofs/MlpRender.lean)"; exit 1; }
          lake env lean LeanMlir/Proofs/CnnRender.lean
          git diff --exit-code -- \
              verified_mlir/cnn_train_step.mlir \
              verified_mlir/cifar_train_step.mlir verified_mlir/cifar_bn_train_step.mlir \
              verified_mlir/cifar8_train_step.mlir verified_mlir/cifar8_bn_train_step.mlir \
            || { echo "::error::committed verified_mlir/{cnn,cifar,cifar_bn,cifar8,cifar8_bn}_train_step.mlir drifted (regen: lake env lean LeanMlir/Proofs/CnnRender.lean)"; exit 1; }
          lake env lean LeanMlir/Proofs/ResNet34Render.lean
          git diff --exit-code -- verified_mlir/resnet34_train_step.mlir \
            || { echo "::error::committed verified_mlir/resnet34_train_step.mlir drifted (regen: lake env lean LeanMlir/Proofs/ResNet34Render.lean)"; exit 1; }
          lake env lean LeanMlir/Proofs/MobileNetV2Render.lean
          git diff --exit-code -- verified_mlir/mobilenetv2_train_step.mlir verified_mlir/mobilenetv2_reduced_train_step.mlir \
            || { echo "::error::committed verified_mlir/mobilenetv2_*train_step.mlir drifted (regen: lake env lean LeanMlir/Proofs/MobileNetV2Render.lean)"; exit 1; }
          lake env lean LeanMlir/Proofs/ConvNeXtRender.lean
          git diff --exit-code -- verified_mlir/convnext_train_step.mlir \
            || { echo "::error::committed verified_mlir/convnext_train_step.mlir drifted (regen: lake env lean LeanMlir/Proofs/ConvNeXtRender.lean)"; exit 1; }
          lake env lean LeanMlir/Proofs/EfficientNetRender.lean
          git diff --exit-code -- verified_mlir/efficientnet_train_step.mlir \
            || { echo "::error::committed verified_mlir/efficientnet_train_step.mlir drifted (regen: lake env lean LeanMlir/Proofs/EfficientNetRender.lean)"; exit 1; }
          lake env lean LeanMlir/Proofs/ViTRender.lean
          git diff --exit-code -- verified_mlir/vit_train_step.mlir verified_mlir/vit_fwd.mlir \
            || { echo "::error::committed verified_mlir/vit_*.mlir drifted (regen: lake env lean LeanMlir/Proofs/ViTRender.lean)"; exit 1; }

      - name: Zero-axiom-declaration guard
        # The former trusted-bridge footprint check is gone: Binary32Instance's
        # ieeeRnd/ieeeRnd_err axioms are DISCHARGED by the constructed rndP grid operator
        # (post_audit_roadmap §2), and the binary32/fp8 bridge capstones are audited inside
        # the main 3-axiom closure above like everything else. This guard makes the new
        # invariant durable: ZERO `axiom` declarations anywhere in the repo's Lean sources.
        run: |
          set -e
          hits=$(grep -rn --include='*.lean' --exclude-dir=.lake -E '^[[:space:]]*(private[[:space:]]+|protected[[:space:]]+)?axiom[[:space:]]+[A-Za-z_]' LeanMlir apps tests jax || true)
          if [ -n "$hits" ]; then
            echo "::error::axiom declarations found (the repo is supposed to have none):"
            echo "$hits"
            exit 1
          fi
          echo "zero axiom declarations repo-wide"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Zero axiom declarations" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **No \`axiom\` declarations anywhere in the repo's Lean sources — the former IEEE rounding axioms are discharged by the constructed \`rndP\` operator (\`Binary32Instance.lean\`), audited in the main 3-axiom closure.**" >> $GITHUB_STEP_SUMMARY

      - name: Summary
        run: |
          echo "## Proof Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Sorry count
          SORRIES=$(lake build Proofs 2>&1 | grep -c "sorry" || true)
          if [ "$SORRIES" -eq 0 ]; then
            echo "✅ **All proofs verified — zero sorry**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **${SORRIES} sorry(s) remaining:**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Line | Note |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
            lake build Proofs 2>&1 | grep "sorry" | while read line; do
              file=$(echo "$line" | sed 's/warning: //' | sed 's/:.*//')
              lineno=$(echo "$line" | grep -o ':[0-9]*:' | head -1 | tr -d ':')
              decl=$(echo "$line" | sed "s/.*declaration uses .sorry.//" | sed "s/'//g")
              case "$file" in
                *Tensor*) note="vjp3_comp: 6-level Finset.sum_comm (sum reordering bookkeeping)" ;;
                *) note="$decl" ;;
              esac
              link="https://github.com/${{ github.repository }}/blob/${{ github.sha }}/${file}#L${lineno}"
              echo "| [${file}](${link}) | ${lineno} | ${note} |" >> $GITHUB_STEP_SUMMARY
            done
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Theorems / Defs | Axioms | Lines |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----------------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          # Count all top-level theorems and (noncomputable) defs — broader
          # than a VJP-keyword filter, catches structural lemmas too.
          THM_PAT='^(theorem|noncomputable def|def) '
          TOTAL_THMS=0
          TOTAL_AXMS=0
          for f in LeanMlir/Proofs/*.lean; do
            name=$(basename "$f")
            thms=$(grep -cE "$THM_PAT" "$f" || true)
            axms=$(grep -c "^axiom " "$f" || true)
            lines=$(wc -l < "$f")
            echo "| \`${name}\` | ${thms} | ${axms} | ${lines} |" >> $GITHUB_STEP_SUMMARY
            TOTAL_THMS=$((TOTAL_THMS + thms))
            TOTAL_AXMS=$((TOTAL_AXMS + axms))
          done
          TOTAL_LINES=$(cat LeanMlir/Proofs/*.lean | wc -l)
          echo "| **Total** | **${TOTAL_THMS}** | **${TOTAL_AXMS}** | **${TOTAL_LINES}** |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Numerical Gradient Checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Axiom | Max Error | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          python3 LeanMlir/Proofs/check_jacobians.py 2>&1 | grep -E "PASS|FAIL" | while read line; do
            status=$(echo "$line" | grep -o "PASS\|FAIL")
            name=$(echo "$line" | sed 's/.*: //' | sed 's/ *max_err.*//')
            err=$(echo "$line" | grep -o "max_err=[0-9.e+-]*" | sed 's/max_err=//')
            icon=$( [ "$status" = "PASS" ] && echo "✅" || echo "❌" )
            echo "| ${name} | ${err} | ${icon} ${status} |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY

          # Fail CI if gradient checks fail
          python3 LeanMlir/Proofs/check_jacobians.py

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Bestiary Entries" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Variants | Lines |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|-------|" >> $GITHUB_STEP_SUMMARY
          total_variants=0
          total_bestiary_lines=0
          total_bestiary_files=0
          for f in Bestiary/*.lean; do
            base=$(basename "$f")
            # Each `def X : NetSpec` is a variant (architecture + sizes + tiny fixtures)
            variants=$(grep -cE '^def [a-zA-Z0-9_]+ : NetSpec' "$f" || true)
            lines=$(wc -l < "$f")
            echo "| \`${base}\` | ${variants} | ${lines} |" >> $GITHUB_STEP_SUMMARY
            total_variants=$((total_variants + variants))
            total_bestiary_lines=$((total_bestiary_lines + lines))
            total_bestiary_files=$((total_bestiary_files + 1))
          done
          echo "| **Total (${total_bestiary_files} files)** | **${total_variants}** | **${total_bestiary_lines}** |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Codebase Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Files | Lines |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|-------|" >> $GITHUB_STEP_SUMMARY
          # Rows partition the Lean tree and sum to Total Lean. Each is a `find` that excludes
          # any nested .lake build tree (e.g. tests/comparator/.lake/packages/mathlib — which a
          # plain `*.lean` walk would otherwise add ~millions of Mathlib lines for).
          lf() { find "$@" -name "*.lean" -not -path "*/.lake/*" 2>/dev/null | wc -l; }      # file count
          ll() { find "$@" -name "*.lean" -not -path "*/.lake/*" -print0 2>/dev/null | xargs -0 cat 2>/dev/null | wc -l; }  # line count
          # Core Library = LeanMlir/ minus the Proofs/ subtree, plus the root umbrella.
          core() { find LeanMlir -name "*.lean" -not -path "LeanMlir/Proofs/*" -not -path "*/.lake/*"; ls LeanMlir.lean 2>/dev/null; }
          echo "| Proofs | $(lf LeanMlir/Proofs) | $(ll LeanMlir/Proofs) |" >> $GITHUB_STEP_SUMMARY
          echo "| Core Library | $(core | wc -l) | $(core | xargs cat 2>/dev/null | wc -l) |" >> $GITHUB_STEP_SUMMARY
          echo "| Bestiary | $(lf Bestiary) | $(ll Bestiary) |" >> $GITHUB_STEP_SUMMARY
          # Trainers = apps/**/Main*.lean (all backends/optimizers) + the historical/ trainers.
          echo "| Trainers | $(find apps historical -name 'Main*.lean' 2>/dev/null | wc -l) | $(find apps historical -name 'Main*.lean' -exec cat {} + 2>/dev/null | wc -l) |" >> $GITHUB_STEP_SUMMARY
          echo "| Demos | $(ls demos/*.lean 2>/dev/null | wc -l) | $(cat demos/*.lean 2>/dev/null | wc -l) |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | $(lf tests) | $(ll tests) |" >> $GITHUB_STEP_SUMMARY
          echo "| FFI (C) | $(ls ffi/*.c ffi/*.h 2>/dev/null | wc -l) | $(cat ffi/*.c ffi/*.h 2>/dev/null | wc -l) |" >> $GITHUB_STEP_SUMMARY
          # Total Lean: every *.lean except build files (lakefile.lean), any nested .lake tree,
          # and the jax/ + phase-1 mnist-lean4/ subprojects.
          total_lean=$(find . -name "*.lean" -not -name "lakefile.lean" -not -path "*/.lake/*" -not -path "./jax/*" -not -path "./mnist-lean4/*" -print0 | xargs -0 cat 2>/dev/null | wc -l)
          total_c=$(cat ffi/*.c ffi/*.h 2>/dev/null | wc -l)
          echo "| **Total Lean** | | **${total_lean}** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total C** | | **${total_c}** |" >> $GITHUB_STEP_SUMMARY
