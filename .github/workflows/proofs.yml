name: Verify Proofs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check-proofs:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Audit coverage check (AuditAxioms imports âŠ† Proofs roots)
        # Fail fast (no Lean needed) if tests/AuditAxioms.lean imports a module
        # that `lake build Proofs` won't build â€” on a fresh runner that olean
        # is missing and the closure check below dies with no useful output.
        # Locally the gap hides behind stale dev .oleans, so CI is the only
        # place it surfaces (see 5f27766).
        run: python3 scripts/check_audit_coverage.py

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake
          # Rolling key (per-run suffix) so every run PERSISTS its freshly-built
          # .lake. A static key is immutable once created, so source-only edits
          # (which don't change toolchain/lakefile/manifest) never refresh the
          # cache and every run rebuilds the heavy downstream cone (e.g. ViTBackB0)
          # from a frozen snapshot. restore-keys still restores the latest match.
          key: lake-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}-${{ github.run_id }}
          restore-keys: |
            lake-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}-
            lake-

      - name: Install Python deps
        run: pip install scipy numpy

      - name: Build proofs
        run: |
          # Build the whole `Proofs` lib (all roots + transitive imports) so the
          # axiom-closure check below can `lake env lean tests/AuditAxioms.lean`
          # against every proof module â€” including opt-in roots like MnistCNN
          # and MatBridge that AuditAxioms imports. Future roots are covered too.
          # Fetch the Mathlib olean cache (fast no-op when the .lake cache already
          # restored it) so a rolling-key cache miss never rebuilds Mathlib from source.
          lake exe cache get || true
          lake build Proofs

      - name: Verified-render drift guard (committed .mlir == proven renderer)
        # Re-elaborate StableHLO.lean (re-runs its #eval writers) so the
        # committed verified_mlir/linear_* equal `linearTrainStepModuleV` /
        # `linearFwdModuleV` â€” the renderer LinearFaithfulPoC.lean certifies and
        # MainMnistLinearVerified trains on. If they drift, fail (regenerate with
        # `lake env lean LeanMlir/Proofs/StableHLO.lean`). The PoC tie for the
        # mnist-linear chapter trainer; extend per net as renderers are proven.
        run: |
          set -e
          lake env lean LeanMlir/Proofs/StableHLO.lean
          git diff --exit-code -- verified_mlir/linear_train_step.mlir verified_mlir/linear_fwd.mlir \
            || { echo "::error::committed verified_mlir/linear_*.mlir drifted from the proven renderer"; exit 1; }

      - name: Three-axiom closure check
        run: |
          set -e
          out=$(lake env lean tests/AuditAxioms.lean 2>&1)
          total=$(echo "$out" | grep -c "depends on axioms:" || true)
          ok=$(echo "$out" | grep -cE "depends on axioms: \[propext, Classical\.choice, Quot\.sound\]$" || true)

          echo "Total #print axioms lines:        $total"
          echo "Lines matching {propext, Classical.choice, Quot.sound}: $ok"

          if [ "$total" -eq 0 ]; then
            echo "::error::tests/AuditAxioms.lean produced no #print axioms output"
            echo "$out"
            exit 1
          fi

          if [ "$total" -ne "$ok" ]; then
            echo "::error::Some theorems depend on axioms outside [propext, Classical.choice, Quot.sound]:"
            echo "$out" | grep "depends on axioms:" \
              | grep -vE "depends on axioms: \[propext, Classical\.choice, Quot\.sound\]$" || true
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Three-Axiom Closure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "âś… **All ${total} headline theorems closed under [\`propext\`, \`Classical.choice\`, \`Quot.sound\`]**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Verified by \`tests/AuditAxioms.lean\` (no \`sorryAx\`, no project axioms)." >> $GITHUB_STEP_SUMMARY

          # â”€â”€ Verified-faithful train-step scorecard â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          # Durable per-run log of which chapters' committed
          # verified_mlir/<net>_train_step.mlir is render(provenGraph) with every
          # output's den proven = the certified fderiv-derived SGD step. A âś… is
          # data-driven: it only prints if the net's PoC capstone is in the
          # 3-axiom closure above (so this table can't drift from what's proven).
          faithful() { echo "$out" | grep -qE "'Proofs.$1' depends on axioms: \[propext, Classical\.choice, Quot\.sound\]$" && printf 'âś…' || printf 'âš ď¸Ź'; }
          {
            echo ""
            echo "## Verified-faithful train steps"
            echo ""
            echo "âś… = the committed \`verified_mlir/<net>_train_step.mlir\` is \`pretty(provenGraph)\` and every parameter output's \`den\` is proven equal to the certified \`fderiv\`-derived loss-descent SGD step (within the 3-axiom closure above). WIP = â„ť VJP / forward proven, train-step fold pending. Residual for âś… rows: per-op \`pretty\` lexing + â„ťâ†’Float32."
            echo ""
            echo "| Chapter / net | train step = render(provenGraph) | den = certified | capstone |"
            echo "|---|---|---|---|"
            echo "| mnist-linear   | $(faithful LinPoC.poc_fwd_is_render) | $(faithful LinPoC.poc_train_step_tail_certified) | \`poc_train_step_tail_certified\` |"
            echo "| mnist-mlp (1d) | $(faithful MlpPoC.W0_den_certified) | $(faithful MlpPoC.b0_den_certified) | \`{W,b}{0,1,2}_den_certified\` |"
            echo "| mnist-cnn (2d) | $(faithful CnnPoC.cW1_den) | $(faithful CnnPoC.db5_den) | \`{cW,cb}{1,2}_den\` + \`{dW,db}{3,4,5}_den\` |"
            echo "| cifar (ch5, no-BN) | $(faithful CifarPoC.convW_den) | $(faithful CifarPoC.db7_den) | \`conv{W,B}_den\` + \`{dW,db}{5,6,7}_den\` |"
            echo "| cifar-bn (ch5) | $(faithful CifarBnPoC.bnGamma_den) | $(faithful CifarBnPoC.bnBeta_den) | \`bnGamma_den\`/\`bnBeta_den\` + cifar conv/dense |"
            echo "| r34 / mnv2 / enet / convnext / vit | âš ď¸Ź WIP | âš ď¸Ź WIP | â„ť whole-net VJP proven; fold pending |"
          } >> $GITHUB_STEP_SUMMARY

      - name: Summary
        run: |
          echo "## Proof Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Sorry count
          SORRIES=$(lake build Proofs 2>&1 | grep -c "sorry" || true)
          if [ "$SORRIES" -eq 0 ]; then
            echo "âś… **All proofs verified â€” zero sorry**" >> $GITHUB_STEP_SUMMARY
          else
            echo "âš ď¸Ź **${SORRIES} sorry(s) remaining:**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Line | Note |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
            lake build Proofs 2>&1 | grep "sorry" | while read line; do
              file=$(echo "$line" | sed 's/warning: //' | sed 's/:.*//')
              lineno=$(echo "$line" | grep -o ':[0-9]*:' | head -1 | tr -d ':')
              decl=$(echo "$line" | sed "s/.*declaration uses .sorry.//" | sed "s/'//g")
              case "$file" in
                *Tensor*) note="vjp3_comp: 6-level Finset.sum_comm (sum reordering bookkeeping)" ;;
                *) note="$decl" ;;
              esac
              link="https://github.com/${{ github.repository }}/blob/${{ github.sha }}/${file}#L${lineno}"
              echo "| [${file}](${link}) | ${lineno} | ${note} |" >> $GITHUB_STEP_SUMMARY
            done
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Theorems / Defs | Axioms | Lines |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----------------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          # Count all top-level theorems and (noncomputable) defs â€” broader
          # than a VJP-keyword filter, catches structural lemmas too.
          THM_PAT='^(theorem|noncomputable def|def) '
          TOTAL_THMS=0
          TOTAL_AXMS=0
          for f in LeanMlir/Proofs/*.lean; do
            name=$(basename "$f")
            thms=$(grep -cE "$THM_PAT" "$f" || true)
            axms=$(grep -c "^axiom " "$f" || true)
            lines=$(wc -l < "$f")
            echo "| \`${name}\` | ${thms} | ${axms} | ${lines} |" >> $GITHUB_STEP_SUMMARY
            TOTAL_THMS=$((TOTAL_THMS + thms))
            TOTAL_AXMS=$((TOTAL_AXMS + axms))
          done
          TOTAL_LINES=$(cat LeanMlir/Proofs/*.lean | wc -l)
          echo "| **Total** | **${TOTAL_THMS}** | **${TOTAL_AXMS}** | **${TOTAL_LINES}** |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Numerical Gradient Checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Axiom | Max Error | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          python3 LeanMlir/Proofs/check_jacobians.py 2>&1 | grep -E "PASS|FAIL" | while read line; do
            status=$(echo "$line" | grep -o "PASS\|FAIL")
            name=$(echo "$line" | sed 's/.*: //' | sed 's/ *max_err.*//')
            err=$(echo "$line" | grep -o "max_err=[0-9.e+-]*" | sed 's/max_err=//')
            icon=$( [ "$status" = "PASS" ] && echo "âś…" || echo "âťŚ" )
            echo "| ${name} | ${err} | ${icon} ${status} |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY

          # Fail CI if gradient checks fail
          python3 LeanMlir/Proofs/check_jacobians.py

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Bestiary Entries" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Variants | Lines |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|-------|" >> $GITHUB_STEP_SUMMARY
          total_variants=0
          total_bestiary_lines=0
          total_bestiary_files=0
          for f in Bestiary/*.lean; do
            base=$(basename "$f")
            # Each `def X : NetSpec` is a variant (architecture + sizes + tiny fixtures)
            variants=$(grep -cE '^def [a-zA-Z0-9_]+ : NetSpec' "$f" || true)
            lines=$(wc -l < "$f")
            echo "| \`${base}\` | ${variants} | ${lines} |" >> $GITHUB_STEP_SUMMARY
            total_variants=$((total_variants + variants))
            total_bestiary_lines=$((total_bestiary_lines + lines))
            total_bestiary_files=$((total_bestiary_files + 1))
          done
          echo "| **Total (${total_bestiary_files} files)** | **${total_variants}** | **${total_bestiary_lines}** |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Codebase Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Files | Lines |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|-------|" >> $GITHUB_STEP_SUMMARY
          for category in "Proofs:LeanMlir/Proofs/*.lean" "Core Library:LeanMlir/*.lean" "Bestiary:Bestiary/*.lean" "Trainers:Main*Train*.lean" "Tests:tests/*.lean" "FFI (C):ffi/*.c ffi/*.h"; do
            name="${category%%:*}"
            pattern="${category##*:}"
            files=$(ls $pattern 2>/dev/null | wc -l)
            lines=$(cat $pattern 2>/dev/null | wc -l)
            echo "| ${name} | ${files} | ${lines} |" >> $GITHUB_STEP_SUMMARY
          done
          total_lean=$(find . -name "*.lean" -not -path "./.lake/*" -not -path "./jax/*" -not -path "./mnist-lean4/*" | xargs cat | wc -l)
          total_c=$(cat ffi/*.c ffi/*.h 2>/dev/null | wc -l)
          echo "| **Total Lean** | | **${total_lean}** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total C** | | **${total_c}** |" >> $GITHUB_STEP_SUMMARY
