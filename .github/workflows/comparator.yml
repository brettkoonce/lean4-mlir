name: Comparator (independent kernel re-check)

# Independent kernel re-verification of the proof suite via
# leanprover/comparator: re-runs Lean's kernel typechecker (separately
# from the elaborator) and statically checks the transitive axiom closure
# of every theorem against [propext, Quot.sound, Classical.choice].
#
# This is the deep, slow backstop for the zero-project-axioms claim.
# The fast per-push gate stays `proofs.yml` (which runs
# tests/AuditAxioms.lean). Keep this check NON-REQUIRED until it has gone
# green a few times on the runner — see "Known risk" below.
#
# Known risk: comparator sandboxes via Landlock ABI v5, which needs
# Linux kernel >= 6.10. GitHub's `ubuntu-24.04` image currently ships a
# new-enough kernel; `ubuntu-22.04` does NOT. The `uname -r` step below
# makes the kernel legible if the sandbox ever fails.
#
# Tool pinning: lean4export reads the project's `.olean`s, so its build
# must stay olean-compatible with the project's Lean (v4.31.0 — bumped from
# v4.30.0; the pinned LEAN4EXPORT_REF below still builds cleanly at v4.31.0,
# verified locally). The refs below are upstream HEAD at authoring time; if a
# future bump breaks the build, pin LEAN4EXPORT_REF/COMPARATOR_REF to the first
# commit that went green here (or to a commit whose lean-toolchain matches the
# project's).

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'LeanMlir/Proofs/**'
      - 'tests/comparator/**'
      - '.github/workflows/comparator.yml'
  workflow_dispatch:

jobs:
  comparator:
    runs-on: ubuntu-24.04        # Landlock ABI v5 -> kernel >= 6.10
    # 90, not 45: a COLD Certs build is ~42 min (`Build proof suite`) + ~11 min
    # of run.sh — the old 45-min cap killed the one-time cold bootstrap before it
    # could save the `lake-certs-` cache (run #219). Cold only happens on the
    # first run of a new Mathlib/manifest hash; warm runs are ~6 min. certs.yml
    # already uses 180 here, which is why it survived the same cold build.
    timeout-minutes: 90
    env:
      LEAN4EXPORT_REF: cd502a76e05515e7d3e09eaefee1dfd8349ca592
      COMPARATOR_REF:  3afea238d63125383110f8b59acaf11d7788c3e1
      # v0.1.14 is the first release whose CLI accepts comparator's
      # single-dash `-ldd` / `-add-exec` (v0.1.13's urfave/cli rejects them).
      LANDRUN_VERSION: v0.1.14
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        # Mathlib is materialized twice here (parent `lake build Certs`, then
        # again when tests/comparator resolves its own Mathlib) — both served
        # from the olean cache (`lake exe cache get`), not compiled from source.
        # Two ~2.3 GB olean trees still land on disk during the run, overflowing
        # the runner's ~14 GB free, so reclaim the ~20+ GB of preinstalled SDKs
        # we don't use (Android, .NET, GHC, CodeQL) up front.
        run: |
          df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
                      /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h /

      - name: Show kernel (Landlock v5 needs >= 6.10)
        run: uname -r

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache .lake (parent — Mathlib + proof oleans)
        uses: actions/cache@v4
        with:
          path: .lake/build
          # Cache ONLY the parent project build (Certs oleans), NOT .lake/packages
          # — Mathlib comes from `lake exe cache get` below. Rolling key kept for
          # freshness, but the entry is now a few hundred MB instead of ~3 GB, so
          # it no longer blows GitHub's ~10 GB budget → no eviction. Shares the
          # `lake-certs-` namespace with certs.yml (both run `lake build Certs`),
          # so the two warm each other and never restore proofs.yml's Proofs-only
          # build (which would rebuild the Certs corpus cold). See proofs.yml.
          key: lake-certs-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}-${{ github.run_id }}
          restore-keys: |
            lake-certs-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}-
            lake-certs-

      - name: Build proof suite (warms Mathlib + corpus oleans for comparator)
        run: |
          # `Certs` since the 2026-07-06 Proofs/Certs split: the comparator
          # re-checks corpus theorems (whole-net VJPs, seals), and `Proofs` is
          # now only the slim demo-cone slice. Certs' roots subsume it.
          lake exe cache get
          lake build Certs

      - name: Install landrun
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/landrun" \
            "https://github.com/Zouuup/landrun/releases/download/${LANDRUN_VERSION}/landrun-linux-amd64"
          chmod +x "$HOME/.local/bin/landrun"
          landrun --version
          # Guard: comparator passes single-dash `-ldd`; fail loudly (rather
          # than 40 lines into the run) if a version bump regresses that.
          if landrun -ldd 2>&1 | grep -q 'not defined'; then
            echo "::error::landrun ${LANDRUN_VERSION} rejects the single-dash -ldd flag comparator emits"
            exit 1
          fi

      - name: Cache lean4export build
        id: cache-lean4export
        # Key includes the project toolchain: lean4export's olean reader is
        # version-locked, so it must be rebuilt when the project's Lean
        # changes — and this busts caches from a mismatched build.
        uses: actions/cache@v4
        with:
          path: ~/lean4export
          key: lean4export-${{ env.LEAN4EXPORT_REF }}-${{ hashFiles('lean-toolchain') }}

      - name: Build lean4export (.olean -> text exporter)
        if: steps.cache-lean4export.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/leanprover/lean4export ~/lean4export
          git -C ~/lean4export checkout "$LEAN4EXPORT_REF"
          # lean4export reads the project's .oleans, so it must be built with
          # the project's exact Lean (v4.31.0) — the `cp lean-toolchain` below
          # forces that; a mismatched build rejects our headers ("incompatible
          # header").
          cp lean-toolchain ~/lean4export/lean-toolchain
          (cd ~/lean4export && lake build)

      - name: Cache comparator build
        id: cache-comparator
        uses: actions/cache@v4
        with:
          path: ~/comparator
          key: comparator-${{ env.COMPARATOR_REF }}

      - name: Build comparator
        if: steps.cache-comparator.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/leanprover/comparator ~/comparator
          git -C ~/comparator checkout "$COMPARATOR_REF"
          (cd ~/comparator && lake build)

      - name: Link tools onto PATH
        run: |
          ln -sf ~/lean4export/.lake/build/bin/lean4export "$HOME/.local/bin/lean4export"
          ln -sf ~/comparator/.lake/build/bin/comparator  "$HOME/.local/bin/comparator"
          command -v landrun lean4export comparator

      - name: Run comparator (52 theorems, kernel + axiom-closure re-check)
        run: |
          cd tests/comparator
          ./run.sh
