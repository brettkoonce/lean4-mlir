name: Comparator (independent kernel re-check)

# Independent kernel re-verification of the proof suite via
# leanprover/comparator: re-runs Lean's kernel typechecker (separately
# from the elaborator) and statically checks the transitive axiom closure
# of every theorem against [propext, Quot.sound, Classical.choice].
#
# This is the deep, slow backstop for the zero-project-axioms claim.
# The fast per-push gate stays `proofs.yml` (which runs
# tests/AuditAxioms.lean). Keep this check NON-REQUIRED until it has gone
# green a few times on the runner — see "Known risk" below.
#
# Known risk: comparator sandboxes via Landlock ABI v5, which needs
# Linux kernel >= 6.10. GitHub's `ubuntu-24.04` image currently ships a
# new-enough kernel; `ubuntu-22.04` does NOT. The `uname -r` step below
# makes the kernel legible if the sandbox ever fails.
#
# Tool pinning: lean4export reads the project's `.olean`s, so its build
# must stay olean-compatible with the project's Lean (v4.30.0). The refs
# below are upstream HEAD at authoring time; if a future bump breaks the
# build, pin LEAN4EXPORT_REF/COMPARATOR_REF to the first commit that went
# green here (or to a commit whose lean-toolchain matches v4.30.0).

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'LeanMlir/Proofs/**'
      - 'tests/comparator/**'
      - '.github/workflows/comparator.yml'
  workflow_dispatch:

jobs:
  comparator:
    runs-on: ubuntu-24.04        # Landlock ABI v5 -> kernel >= 6.10
    timeout-minutes: 45
    env:
      LEAN4EXPORT_REF: cd502a76e05515e7d3e09eaefee1dfd8349ca592
      COMPARATOR_REF:  3afea238d63125383110f8b59acaf11d7788c3e1
      # v0.1.14 is the first release whose CLI accepts comparator's
      # single-dash `-ldd` / `-add-exec` (v0.1.13's urfave/cli rejects them).
      LANDRUN_VERSION: v0.1.14
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        # Mathlib is built/cached twice here (parent `lake build Proofs`, then
        # again when tests/comparator resolves its own Mathlib), which overflows
        # the runner's ~14 GB free. Reclaim the ~20+ GB of preinstalled SDKs we
        # don't use (Android, .NET, GHC, CodeQL) up front.
        run: |
          df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
                      /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h /

      - name: Show kernel (Landlock v5 needs >= 6.10)
        run: uname -r

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache .lake (parent — Mathlib + proof oleans)
        uses: actions/cache@v4
        with:
          path: .lake
          # Rolling key (per-run suffix) so the cache refreshes each run instead of
          # freezing at the last toolchain/lakefile/manifest change — see proofs.yml.
          key: lake-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}-${{ github.run_id }}
          restore-keys: |
            lake-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}-
            lake-

      - name: Build proof suite (warms Mathlib + Proofs oleans for comparator)
        run: |
          lake exe cache get
          lake build Proofs

      - name: Install landrun
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/landrun" \
            "https://github.com/Zouuup/landrun/releases/download/${LANDRUN_VERSION}/landrun-linux-amd64"
          chmod +x "$HOME/.local/bin/landrun"
          landrun --version
          # Guard: comparator passes single-dash `-ldd`; fail loudly (rather
          # than 40 lines into the run) if a version bump regresses that.
          if landrun -ldd 2>&1 | grep -q 'not defined'; then
            echo "::error::landrun ${LANDRUN_VERSION} rejects the single-dash -ldd flag comparator emits"
            exit 1
          fi

      - name: Cache lean4export build
        id: cache-lean4export
        # Key includes the project toolchain: lean4export's olean reader is
        # version-locked, so it must be rebuilt when the project's Lean
        # changes — and this busts caches from a mismatched build.
        uses: actions/cache@v4
        with:
          path: ~/lean4export
          key: lean4export-${{ env.LEAN4EXPORT_REF }}-${{ hashFiles('lean-toolchain') }}

      - name: Build lean4export (.olean -> text exporter)
        if: steps.cache-lean4export.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/leanprover/lean4export ~/lean4export
          git -C ~/lean4export checkout "$LEAN4EXPORT_REF"
          # lean4export reads the project's .oleans, so it must be built with
          # the project's exact Lean — its HEAD pins a newer toolchain whose
          # olean reader rejects our v4.30.0 headers ("incompatible header").
          cp lean-toolchain ~/lean4export/lean-toolchain
          (cd ~/lean4export && lake build)

      - name: Cache comparator build
        id: cache-comparator
        uses: actions/cache@v4
        with:
          path: ~/comparator
          key: comparator-${{ env.COMPARATOR_REF }}

      - name: Build comparator
        if: steps.cache-comparator.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/leanprover/comparator ~/comparator
          git -C ~/comparator checkout "$COMPARATOR_REF"
          (cd ~/comparator && lake build)

      - name: Link tools onto PATH
        run: |
          ln -sf ~/lean4export/.lake/build/bin/lean4export "$HOME/.local/bin/lean4export"
          ln -sf ~/comparator/.lake/build/bin/comparator  "$HOME/.local/bin/comparator"
          command -v landrun lean4export comparator

      - name: Run comparator (49 theorems, kernel + axiom-closure re-check)
        run: |
          cd tests/comparator
          ./run.sh
