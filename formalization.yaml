status:
  scope: >-
    Machine-checked vector-Jacobian-product (backward-pass) correctness for the
    layer primitives of eight architectures and their full-network compositions:
    MLP, 2D CNN, BatchNorm-CNN, ResNet-34, MobileNetV2, EfficientNet-B0,
    ConvNeXt-T, and ViT-Tiny. Covers dense, ReLU/ReLU6, softmax cross-entropy,
    2D / strided / depthwise convolution, max-pool, global-average-pool,
    batch-norm's three-term backward, residual + projection blocks,
    squeeze-excitation, GELU/Swish/sigmoid, layer-norm, layer-scale, and a
    multi-theorem treatment of scaled-dot-product / multi-head self-attention
    through the full transformer tower. On top of the VJP layer, four further
    proved programs: (1) TRAIN-STEP TIES — every committed train step of all 12
    nets is tied to its real loss-driven backward cotangent (per-net *TiePoC
    capstones, e.g. the all-200-params vit_net_tied_certified), plus
    committed-spec ties for all 5 ImageNet-scale nets (SpecVJP); (2) FLOAT
    ERROR — a binary32 rounding model constructed from scratch (rndP, standard
    model PROVED, no hardware axioms), whole-net forward+backward float-error
    bridges for all nets, depth-linear adjoint-chain composition bounds
    certified for every net, an fp8-E4M3 argmax-preservation theorem, and an
    end-to-end capstone (cifar8_chain_argmaxSafe: binary32 rounding cannot flip
    the prediction) plus SGD-descent theorems at trained weights; (3) ROBUSTNESS
    CERTIFICATES as theorems — the Tsuzuku Lipschitz-margin radius, per-class-
    pair LipSDP with exact-rational LDL^T PSD witnesses (mechanized 100-image
    scorecards at trained weights, 69/100 certified vs a 72/100 PGD bracket),
    and the Cohen randomized-smoothing radius proved END-TO-END — the Gaussian
    (1/sigma)-Lipschitz probit (Neyman-Pearson core, Cameron-Martin shift,
    dimension reduction via rotation invariance) is a theorem, not a hypothesis;
    (4) OPTIMIZER GEOMETRY — SGD/sign/Muon as steepest descent under a norm,
    Muon's polar factor as the nuclear-norm argmax, Shampoo = single-step Muon,
    and the Newton-Schulz spectral-step lemma. Each NetSpec also emits StableHLO
    MLIR (compiled by IREE, cross-checked against a parallel JAX pipeline) —
    that codegen/training path is engineered and empirically validated, NOT
    part of the proved theorems (see fidelity.divergences).
  sorry_count: 0
  sorry_in_definitions: 0
  axioms: ["propext", "Quot.sound", "Classical.choice"]   # Lean/mathlib core only; no project axioms
  main_results:
