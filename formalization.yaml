# formalization.yaml — see https://github.com/mathlib-initiative/formalization.yaml
# Self-reported. The factual spine (axioms, comparator count, license, source)
# is verifiable from the repo; the fidelity/review sections are written to state
# the project's known gaps plainly rather than to pitch.
version: "v0.3"

project:
  name: "Verified Deep Learning with Lean 4"
  authors: ["Brett Koonce"]
  license: "BSD-3-Clause"

sources:
  - title: "Convolutional Neural Networks with Swift for TensorFlow"
    authors: ["Brett Koonce"]
    id: "doi:10.1007/978-1-4842-6168-2"   # Apress, 2021
    type: "textbook"
    license: ""                            # commercial (Apress)
    author_contacted: "n/a"               # the formalization author wrote this book
    prior_work: ""                         # extends the book; coverage pushed through ConvNeXt + ViT
  - title: "Mathlib"
    authors: ["The mathlib community"]
    id: "https://github.com/leanprover-community/mathlib4"
    type: "library"
    license: "Apache-2.0"
    author_contacted: "n/a"
    prior_work: ""                         # foundation: fderiv / Differentiable API; see literature_dependencies

status:
  scope: >-
    Machine-checked vector-Jacobian-product (backward-pass) correctness for the
    layer primitives of six vision architectures and their full-network
    compositions: MLP, 2D CNN, BatchNorm-CNN, ResNet-34, MobileNetV2,
    EfficientNet-B0, ConvNeXt-T, and ViT-Tiny. Covers dense, ReLU/ReLU6,
    softmax cross-entropy, 2D / strided / depthwise convolution, max-pool,
    global-average-pool, batch-norm's three-term backward, residual + projection
    blocks, squeeze-excitation, GELU/Swish/sigmoid, layer-norm, layer-scale, and
    a multi-theorem treatment of scaled-dot-product / multi-head self-attention
    through the full transformer tower. Each NetSpec also emits StableHLO MLIR
    (compiled by IREE, cross-checked against a parallel JAX pipeline) — that
    codegen/training path is engineered and empirically validated, NOT part of
    the proved theorems (see fidelity.divergences).
  sorry_count: 0
  sorry_in_definitions: 0
  axioms: ["propext", "Quot.sound", "Classical.choice"]   # Lean/mathlib core only; no project axioms
  main_results:
    # Representative headline set. The full audit (tests/AuditAxioms.lean) runs
    # `#print axioms` on 535 declarations; 51 are independently kernel-rechecked
    # by the comparator (tests/comparator/config.json). All close under exactly
    # the three core axioms above. comparator_config below points at that config
    # for results included in the 51-theorem recheck.
    - declaration: "Proofs.pdiv_comp"          # chain / additive / multiplicative fan-in + finset-sum
      file: "LeanMlir/Proofs/Tensor.lean"
      sorry_count: 0
      axioms: ["propext", "Quot.sound", "Classical.choice"]
      comparator_config: "tests/comparator/config.json"
      literature_dependencies:
        - statement: "fderiv chain rule, fderiv of sum, Differentiable composition"
          source: "Mathlib.Analysis.Calculus.FDeriv"
    - declaration: "Proofs.dense_weight_grad_correct"
      file: "LeanMlir/Proofs/MLP.lean"
      sorry_count: 0
      axioms: ["propext", "Quot.sound", "Classical.choice"]
      comparator_config: "tests/comparator/config.json"
      literature_dependencies: []
    - declaration: "Proofs.conv2d_has_vjp3_correct"
      file: "LeanMlir/Proofs/CNN.lean"
      sorry_count: 0
      axioms: ["propext", "Quot.sound", "Classical.choice"]
      comparator_config: "tests/comparator/config.json"
      literature_dependencies: []
    - declaration: "Proofs.bn_input_grad_correct"   # batch-norm three-term backward
      file: "LeanMlir/Proofs/BatchNorm.lean"
      sorry_count: 0
      axioms: ["propext", "Quot.sound", "Classical.choice"]
      comparator_config: ""    # audited; not in the 51-theorem comparator subset
      literature_dependencies: []
    - declaration: "Proofs.layerNorm_has_vjp_correct"
      file: "LeanMlir/Proofs/LayerNorm.lean"
      sorry_count: 0
      axioms: ["propext", "Quot.sound", "Classical.choice"]
      comparator_config: "tests/comparator/config.json"
      literature_dependencies: []
    - declaration: "Proofs.softmaxCE_grad"
      file: "LeanMlir/Proofs/Attention.lean"
      sorry_count: 0
      axioms: ["propext", "Quot.sound", "Classical.choice"]
      comparator_config: "tests/comparator/config.json"
      literature_dependencies: []
    - declaration: "Proofs.mhsa_has_vjp_mat_correct"   # multi-head self-attention
      file: "LeanMlir/Proofs/Attention.lean"
      sorry_count: 0
      axioms: ["propext", "Quot.sound", "Classical.choice"]
      comparator_config: "tests/comparator/config.json"
      literature_dependencies: []
    - declaration: "Proofs.vit_full_has_vjp_correct"   # full ViT-Tiny body composes + has a VJP
      file: "LeanMlir/Proofs/Attention.lean"
      sorry_count: 0
      axioms: ["propext", "Quot.sound", "Classical.choice"]
      comparator_config: "tests/comparator/config.json"
