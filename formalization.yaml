        spend_usd: ""        # not tracked
        hardware: "two GPU workstations for training + codegen validation across both vendor stacks — 6x RTX 4060 Ti (NVIDIA/CUDA) and 2x Radeon RX 7900 XTX (AMD/ROCm, gfx1100); API for proof work"
      prompting_notes: >-
        Mixed interactive + agentic. Proof development, codegen, the audit, and
