    Heavily AI-assisted throughout — proof authoring, MLIR/JAX codegen, the
    self-audit, and training. Not an unattended autonomous run; the author
    drove and reviewed the work.

fidelity:
  divergences: |
    The proved theorems form tiers; not everything the prose/abstract describes
    is a theorem. Stated plainly:

    1. STRONGEST — layer VJP correctness. The per-layer backward formulas
       (dense, conv, batch-norm, layer-norm, softmax-CE, attention/MHSA, GELU,
       etc.) are derived from Mathlib's `fderiv` and machine-checked. These are
       the core results and are the bulk of the 52 comparator-rechecked theorems.

    2. CODEGEN TRUST BOUNDARY (disclosed gap). The canonical backward is the
       `fderiv`/`pdiv` expression, which at NON-smooth points (a ReLU input
       exactly 0, a pooling argmax tie) returns Mathlib's junk default of 0,
       whereas the emitted codegen uses the standard subgradient/argmax
       convention (`if x>0 then dy else 0`, select-and-scatter). They agree only
       at smooth points. This is documented in LeanMlir/Proofs/README.md
       ("Codegen trust boundary"); smooth-point bridge theorems were added
       (`relu_codegen_matches_canonical`, `maxPool2_codegen_matches_canonical`).

    3. SMOOTH-INPUT CONDITIONING. The global instances `relu_has_vjp`,
       `mlp_has_vjp`, `maxPool2_has_vjp3` define `backward` as the pdiv-sum RHS
       and close `correct` by `rfl` — codegen-shaped witnesses whose formal
       content is the pdiv expression (which fully characterizes backprop only at
       smooth points). The earlier limitation (global composition needing
       `Differentiable R f`, which blocked ReLU-containing chains) has since been
       addressed: a pointwise `HasVJPAt` API with `vjp_comp_at` (Tensor.lean) plus
       `relu_has_vjp_at` / `mlp_has_vjp_at` (MLP.lean) give real chain-rule proofs
       — no rfl escape — under an explicit smooth-input hypothesis
       (`∀ k, preact k ≠ 0`, i.e. no ReLU kink / no pooling tie). The residual
       honest caveat is therefore that the strongest backprop-correctness results
       are conditioned on smooth inputs; the measure-zero non-smooth points are
       the disclosed codegen trust boundary of (2).

    4. FULL-NET RESULTS are "the network composes and has a VJP at a witness
       point". To rule out a vacuous (e.g. all-zero-weight) witness, separate
       non-degeneracy proofs exist, now at the strongest level for both deep
       kinked nets: `Mnv2Live` and the 2-channel live ResNet-34
       `ResNet34LivePC.liveFwd2` each prove a non-constant forward
       (`*_nonconstant`, level 2) AND a nonzero whole-net Jacobian at a witness
       point (`Mnv2Live.mnv2Live_jacobian_nonzero`,
       `ResNet34LiveSeal.liveFwd2_jacobian_nonzero`, level 3) — so the rendered
       backward is genuinely not the zero map there. All audited 3-axiom-clean.
       The ResNet witness is also carried to the real `[3,4,6,3]` (16-block)
       depth (`ResNet34LiveFull.liveFwd2Full_jacobian_nonzero` /
       `liveFwd2Full_backward_nontrivial`, level 3), and BOTH nets are sealed at
       the realistic 224x224 input geometry (ResNet via weight-independent
       beta-positivity, MobileNetV2 via gamma-scaling into the ReLU6 window).
       Beyond synthetic witnesses, TRAINED-weight results exist: whole-net VJP
       witnesses + level-3 Jacobian seals at real trained checkpoints and real
       test inputs for the MLP and CNN rungs (TrainedMlpWitness,
       TrainedCnnWitness/TrainedCnnSeal), and a provable strict CE-descent step
       at trained weights (TrainedLinearDescent). A BN-CNN live witness remains
       the last follow-up.

    4b. CERTIFICATE-LAYER CONDITIONING (disclosed hypotheses, all in-statement):
       the smoothing radius theorems require class probabilities in the OPEN
       interval (0,1) (`hp` — the true quantile is undefined at the endpoints;
       Monte-Carlo estimates always satisfy it), and the theorems speak about
       TRUE smoothed probabilities while the reporting driver uses
       Clopper-Pearson ESTIMATES — that estimation gap is not formalized. The
       adjoint-chain float bounds use a per-op Higham model; the balanced-tree
       reduction refinement carries an explicit (quarantined) order-balanced
       hypothesis. The LipSDP scorecards certify a FIXED 100-image subset at a
       FIXED epsilon — an honest lower bound, not a dataset-wide claim.

    5. The suite works over its own `Proofs.Mat m n := Fin m -> Fin n -> R`
       (definitionally Mathlib's `Matrix (Fin m) (Fin n) R`) with its own
       `mulVec/transpose/outer/mul`. This IS bridged to Mathlib's `Matrix`
       namespace by `LeanMlir/Proofs/MatBridge.lean` (`Mat.mulVec_eq`,
       `Mat.transpose_eq`, `Mat.outer_eq`, `Mat.mul_eq`), so a downstream
       consumer can apply Mathlib's matrix algebra to the suite's outputs. The
       bridge is opt-in by design — the core suite does not import it, keeping
       its import surface Matrix-free unless interop is wanted.

    6. NOT PROVED — empirically validated only: that the nets train to good
       ImageNet accuracy, that StableHLO/IREE compilation is faithful, that the
       JAX pipeline agrees numerically, and that bf16 doesn't change results.
       These are engineering claims backed by runs and cross-checks, not
       theorems. The fp8-E4M3 "trainers" are host-side quantization emulation on
       fp32 kernels (the theorems are about the E4M3 value grid, the hardware
       has no fp8 units). Note the hardware-model direction has since STRENGTHENED:
       the binary32/E4M3 rounding models are now constructed (`rndP`, standard
       model proved) rather than axiomatized — the earlier TrustedBridge
       named-axiom quarantine was retired, keeping the project at zero
       non-core axioms.

review:
  status: "agent-reviewed"   # also self-assessed; NOT externally peer-reviewed
  reviewers: []
  notes: >-
    Three independent checks beyond `lake build`: (1) an agent self-audit
    (tests/AUDIT_REPORT*.md) that found no axioms/sorries and surfaced the
    fidelity caveats above, plus a full `#print axioms` sweep of 1393
    declarations (tests/AuditAxioms.lean) run in CI; (2) mutation testing
    (corrupting a backward formula breaks the build at every mutation tried);
    (3) leanprover/comparator re-running Lean's kernel typechecker on 52
    theorems with a hard-coded permitted-axiom allowlist of exactly
    {propext, Quot.sound, Classical.choice} (the nanoda second-kernel pass is
    currently disabled in config pending a lean4export rebuild after a
    toolchain bump). External agent-driven review rounds (2026-07) drove the
    scorecard mechanization and the LipSDP tightening; no external HUMAN peer
    review.

alignment:
  namespace: "Proofs"
  statements:
    - source: "Dense layer backward (weight + bias gradients)"
      lean: "dense_weight_grad_correct / dense_bias_grad_correct"
      module: "LeanMlir/Proofs/Foundation/MLP.lean"
      status: "proved"
      note: ""
    - source: "2D convolution backward"
      lean: "conv2d_has_vjp3_correct"
      module: "LeanMlir/Proofs/Architectures/CNN.lean"
      status: "proved"
      note: ""
    - source: "Batch normalization three-term backward"
      lean: "bn_input_grad_correct"
      module: "LeanMlir/Proofs/Architectures/BatchNorm.lean"
      status: "proved"
      note: ""
    - source: "Multi-head self-attention backward (Q/K/V) + full ViT body"
      lean: "mhsa_has_vjp_mat_correct / vit_full_has_vjp_correct"
      module: "LeanMlir/Proofs/Architectures/Attention.lean"
      status: "proved"
      note: ""
    - source: "ReLU / max-pool backward at non-smooth points"
      lean: "relu_codegen_matches_canonical / maxPool2_codegen_matches_canonical"
      module: "LeanMlir/Proofs/Foundation/MLP.lean, LeanMlir/Proofs/Architectures/CNN.lean"
      status: "proved"
      note: "smooth-point bridge only; non-smooth points are a disclosed trust boundary"
    - source: "Live-network non-degeneracy + nonzero-Jacobian seal (ResNet-34, incl. full [3,4,6,3] depth)"
      lean: "liveFwd2_nonconstant / liveFwd2_jacobian_nonzero (empty chains); liveFwd2Full_nonconstant / liveFwd2Full_jacobian_nonzero + liveFwd2Full_backward_nontrivial (full 16-block depth)"
      module: "LeanMlir/Proofs/Foundation/ResNet34LivePC.lean, LeanMlir/Proofs/ResNet34LiveSeal.lean, LeanMlir/Proofs/Foundation/ResNet34LiveFull.lean"
      status: "proved"
      note: "2-channel live ResNet-34, real [3,4,6,3] depth; sealed at a channel-symmetric base Y (maxpool no-tie + carrier vanishes; identity blocks wash out through BN)"
    - source: "Committed train step = real loss-driven backward (per-net ties, all 12 nets)"
      lean: "<net>_net_tied_certified family (e.g. vit_net_tied_certified, all 200 ViT params)"
      module: "LeanMlir/Proofs/*TiePoC.lean"
      status: "proved"
      note: "genuine backward cotangent, not a free ∀-cotangent; committed-spec ties for all 5 ImageNet nets in SpecVJP"
    - source: "Binary32 rounding model + whole-net float-error composition"
      lean: "rndP_err; <net>_floatBridges / <net>_grad_floatBridges; chain_adjointClose; cifar8_chain_argmaxSafe"
      module: "LeanMlir/Proofs/Float/Binary32Instance.lean, LeanMlir/Proofs/*FloatBridge*.lean, LeanMlir/Proofs/AdjointChain*.lean, LeanMlir/Proofs/Architectures/Cifar8ChainCert.lean"
      status: "proved"
      note: "rounding model CONSTRUCTED (former hardware axioms discharged); capstone: binary32 rounding cannot flip the cifar8 prediction"
    - source: "Tsuzuku 2018 Lipschitz-margin certified radius + LipSDP scorecards at trained weights"
      lean: "lipschitz_margin_certified_radius; scorecard; scorecard_sdp / scorecard_sdp_uncon"
      module: "LeanMlir/Proofs/LipschitzCert.lean, LeanMlir/Proofs/LipschitzCertScorecard*.lean"
      status: "proved"
      note: "fixed 100-image subset at fixed ε — honest lower bound (69/100 vs 72/100 PGD bracket)"
    - source: "Cohen 2019 randomized-smoothing certified radius (incl. the Gaussian Neyman–Pearson core)"
      lean: "smoothing_certified_radius_classifier via smoothing_probit_lipschitz / stdGaussian_np_shift"
      module: "LeanMlir/Proofs/SmoothingGaussian.lean"
      status: "proved"
      note: "end-to-end: quantile inversion, Cameron–Martin shift, rotation-invariance dimension reduction all proved; requires class probabilities in (0,1); the driver's Monte-Carlo estimation gap is not formalized"
    - source: "Optimizer-as-steepest-descent ladder (SGD / sign / Muon / Shampoo, Newton–Schulz)"
      lean: "muon_polar_steepest, shampoo_eq_muon, muon_polar_nearest_orthogonal + spectral-step lemma"
      module: "LeanMlir/Proofs/Foundation/MuonGeometry.lean, LeanMlir/Proofs/Foundation/MuonNewtonSchulz.lean"
      status: "proved"
      note: "14 theorems; singular-G SVD completion + Newton–Schulz convergence dynamics left open"
    - source: "StableHLO/IREE codegen faithfulness, JAX numeric agreement, training accuracy"
      lean: "(none — empirical)"
      module: ""
      status: "not-formalized"
      note: "validated by runs + cross-checks, not by theorems"

acknowledgements: >-
  Built on Mathlib (foundation: fderiv / Differentiable). Independent kernel
